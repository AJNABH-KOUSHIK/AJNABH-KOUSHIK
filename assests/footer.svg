<svg xmlns="http://www.w3.org/2000/svg" width="900" height="150" viewBox="0 0 900 150" fill="none" role="img" aria-label="Thanks for visiting — let's build something cool together">
  <defs>
    <linearGradient id="fBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b29"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <linearGradient id="fTitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92FE9D">
        <animate attributeName="stop-color" values="#92FE9D;#00C9FF;#7117EA;#92FE9D" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#00C9FF">
        <animate attributeName="stop-color" values="#00C9FF;#7117EA;#92FE9D;#00C9FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7117EA">
        <animate attributeName="stop-color" values="#7117EA;#92FE9D;#00C9FF;#7117EA" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="fBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92FE9D"/>
      <stop offset="50%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#7117EA"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <clipPath id="fRound"><rect x="0" y="0" width="900" height="150" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#fRound)">
    <rect width="900" height="150" fill="url(#fBg)"/>
    <rect x="0" y="0"   width="900" height="6" fill="url(#fBar)"/>
    <rect x="0" y="144" width="900" height="6" fill="url(#fBar)"/>

    <!-- ❄️ falling snow -->
    <g fill="#ffffff">
      <circle cx="90"  r="2.5"><animate attributeName="cy" values="-10;160" dur="7s"  begin="0s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.9;0.9;0" dur="7s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="200" r="2"  ><animate attributeName="cy" values="-10;160" dur="9s"  begin="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.8;0.8;0" dur="9s" begin="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="320" r="3"  ><animate attributeName="cy" values="-10;160" dur="6.5s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0"     dur="6.5s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="470" r="2"  ><animate attributeName="cy" values="-10;160" dur="8s"  begin="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0.85;0" dur="8s" begin="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="600" r="2.5"><animate attributeName="cy" values="-10;160" dur="9.5s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.8;0.8;0" dur="9.5s" begin="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="720" r="2"  ><animate attributeName="cy" values="-10;160" dur="7.5s" begin="2s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0"     dur="7.5s" begin="2s" repeatCount="indefinite"/></circle>
      <circle cx="830" r="3"  ><animate attributeName="cy" values="-10;160" dur="8.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.75;0.75;0" dur="8.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    </g>

    <text x="450" y="68" text-anchor="middle" font-family="'Segoe UI',Verdana,Arial,sans-serif" font-size="28" font-weight="800" fill="url(#fTitle)">
      ⭐ Thanks for visiting! ⭐
    </text>
    <text x="450" y="100" text-anchor="middle" font-family="'Segoe UI',Verdana,Arial,sans-serif" font-size="16" font-style="italic" fill="#9fb3c8">
      Serious face, curious mind, big dreams — just doing what I love. 💙
    </text>
  </g>
</svg>
