<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" fill="none" role="img" aria-label="Aashish (Khadush) — Generative AI Specialist, Vibe Coder, Content Creator">
  <defs>
    <!-- animated background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b29"/>
    </linearGradient>

    <!-- flowing title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7117EA">
        <animate attributeName="stop-color" values="#7117EA;#00C9FF;#92FE9D;#7117EA" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#00C9FF">
        <animate attributeName="stop-color" values="#00C9FF;#92FE9D;#7117EA;#00C9FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#92FE9D">
        <animate attributeName="stop-color" values="#92FE9D;#7117EA;#00C9FF;#92FE9D" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- flowing bar gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7117EA"/>
      <stop offset="50%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#92FE9D"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <clipPath id="rounded"><rect x="0" y="0" width="900" height="240" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- background -->
    <rect width="900" height="240" fill="url(#bgGrad)"/>

    <!-- animated top & bottom bars -->
    <rect x="0" y="0" width="900" height="6" fill="url(#barGrad)"/>
    <rect x="0" y="234" width="900" height="6" fill="url(#barGrad)"/>

    <!-- ❄️ falling snow -->
    <g fill="#ffffff">
      <circle cx="70"  r="2.5"><animate attributeName="cy" values="-10;250" dur="7s"  begin="0s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.9;0.9;0" dur="7s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="150" r="3"  ><animate attributeName="cy" values="-10;250" dur="9s"  begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.8;0.8;0" dur="9s" begin="1.5s" repeatCount="indefinite"/></circle>
      <circle cx="240" r="2"  ><animate attributeName="cy" values="-10;250" dur="6s"  begin="0.7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0"     dur="6s" begin="0.7s" repeatCount="indefinite"/></circle>
      <circle cx="330" r="3.5"><animate attributeName="cy" values="-10;250" dur="10s" begin="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0.7;0" dur="10s" begin="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="430" r="2"  ><animate attributeName="cy" values="-10;250" dur="8s"  begin="3s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.9;0.9;0" dur="8s" begin="3s" repeatCount="indefinite"/></circle>
      <circle cx="520" r="3"  ><animate attributeName="cy" values="-10;250" dur="7.5s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.85;0.85;0" dur="7.5s" begin="0.3s" repeatCount="indefinite"/></circle>
      <circle cx="610" r="2.5"><animate attributeName="cy" values="-10;250" dur="9.5s" begin="1.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.8;0.8;0" dur="9.5s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="700" r="2"  ><animate attributeName="cy" values="-10;250" dur="6.5s" begin="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0"     dur="6.5s" begin="2.6s" repeatCount="indefinite"/></circle>
      <circle cx="790" r="3"  ><animate attributeName="cy" values="-10;250" dur="8.5s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.75;0.75;0" dur="8.5s" begin="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="850" r="2.5"><animate attributeName="cy" values="-10;250" dur="7.2s" begin="3.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.9;0.9;0" dur="7.2s" begin="3.4s" repeatCount="indefinite"/></circle>
      <circle cx="190" r="2"  ><animate attributeName="cy" values="-10;250" dur="11s"  begin="4s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0.7;0" dur="11s" begin="4s" repeatCount="indefinite"/></circle>
      <circle cx="660" r="2"  ><animate attributeName="cy" values="-10;250" dur="10.5s" begin="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.8;0.8;0" dur="10.5s" begin="1.8s" repeatCount="indefinite"/></circle>
    </g>

    <!-- eyebrow -->
    <text x="450" y="62" text-anchor="middle" font-family="'Segoe UI',Verdana,Arial,sans-serif" font-size="15" letter-spacing="6" fill="#7d8ba1" font-weight="600">
      ✦ HELLO, WORLD — I'M ✦
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0s" fill="freeze"/>
    </text>

    <!-- title -->
    <text x="450" y="130" text-anchor="middle" font-family="'Segoe UI',Verdana,Arial,sans-serif" font-size="56" font-weight="800" fill="url(#titleGrad)">
      Ajnabh Koushik 
      <animate attributeName="opacity" values="0;1" dur="1.4s" begin="0.2s" fill="freeze"/>
    </text>

    <!-- subtitle -->
    <text x="450" y="172" text-anchor="middle" font-family="'Segoe UI',Verdana,Arial,sans-serif" font-size="20" font-weight="600" fill="#c9d6e5">
      ☕ Java Developer | ⚡ DSA Problem Solver | 🌐 Full Stack Developer
      <animate attributeName="opacity" values="0;1" dur="1.4s" begin="0.8s" fill="freeze"/>
    </text>

    <!-- tagline -->
    <text x="450" y="205" text-anchor="middle" font-family="'Segoe UI',Verdana,Arial,sans-serif" font-size="15" font-style="italic" fill="#7d8ba1">
      “I'm doing what I love to do... 😎💙”
      <animate attributeName="opacity" values="0;1" dur="1.4s" begin="1.3s" fill="freeze"/>
    </text>
  </g>
</svg>
